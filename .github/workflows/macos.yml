name: macOS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-traits:
    name: macOS swift build + test (no traits)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-no-traits-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-no-traits-
      - run: swift --version
      - run: swift build
      - name: swift build (strict concurrency)
        run: swift build -Xswiftc -strict-concurrency=complete
      - run: swift test

  all-traits:
    name: macOS swift test (MLX, CoreML, Llama, FoundationModels)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-all-traits-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-all-traits-
      - run: swift test --traits MLX,CoreML,Llama,FoundationModels

  apple-platforms:
    name: ${{ matrix.platform }} ${{ matrix.action }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: generic/platform=iOS Simulator
            action: test
          - platform: tvOS
            destination: generic/platform=tvOS Simulator
            action: test
          - platform: visionOS
            destination: generic/platform=visionOS Simulator
            action: build-for-testing
          # MockURLProtocol does not intercept URLSession on watchOS, so the
          # provider wire tests fail with NSURLErrorDomain -1003 there. Verify
          # the test bundle compiles for watchOS without executing it.
          - platform: watchOS
            destination: generic/platform=watchOS Simulator
            action: build-for-testing
    steps:
      - uses: actions/checkout@v6
      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ matrix.platform }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ matrix.platform }}-
      - name: xcodebuild ${{ matrix.action }}
        run: |
          xcodebuild ${{ matrix.action }} \
            -scheme swift-ai-hub-Package \
            -destination '${{ matrix.destination }}' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
