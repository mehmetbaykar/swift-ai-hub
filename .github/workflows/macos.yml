name: macOS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-traits:
    name: swift build + test (no traits)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-no-traits-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-no-traits-
      - run: swift --version
      - run: swift build
      - name: swift build (strict concurrency)
        run: swift build -Xswiftc -strict-concurrency=complete
      - run: swift test

  all-traits:
    name: swift build (MLX, CoreML, Llama, FoundationModels)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-all-traits-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-all-traits-
      - run: swift build --traits MLX,CoreML,Llama,FoundationModels
