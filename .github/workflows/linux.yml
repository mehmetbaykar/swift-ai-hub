name: Linux

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: swift build + swift test (no traits)
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v4
      - name: swift build
        run: swift build
      - name: swift build (strict concurrency)
        run: swift build -Xswiftc -strict-concurrency=complete
      - name: swift test
        run: swift test
